version: 2

project_name: dstow

before:
  hooks:
    - go mod tidy

builds:
  - id: dstow
    binary: dstow
    main: ./cmd/dstow
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Env.VERSION}}

archives:
  - id: dstow
    ids: [dstow]
    name_template: "{{ .ProjectName }}_{{ .Tag }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    # TODO(#47/#50): naming `files` here (as gostow does, for its man page and
    # completion scripts) waits on dstow having any — restore once #47 grows
    # a man page and shell completions and #50 wires the release pipeline
    # that ships them. Until then the archive carries goreleaser's defaults
    # (LICENSE*, README*, etc.).

# TODO(#50): nfpms (.deb/.rpm packaging) waits on the GPG signing key
# (GPG_KEY_PATH) and on the man page / completion assets #47 has not built
# yet — restore this block from gostow's .goreleaser/gostow.yaml once #50
# wires the release secrets and those assets exist.
