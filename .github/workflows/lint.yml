name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v9
        with:
          version: "v2.11.4"

      - name: Shellcheck
        # install.sh/snippet.sh are piped into `sh` (or sourced from a user's
        # rc) from the internet; a bug in them runs on a stranger's machine.
        run: shellcheck install.sh snippet.sh test/run-e2e.sh test/e2e/*.sh test/e2e/procure/*.sh
