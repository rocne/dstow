name: Release dstow

# Break-glass release path: push a tag (e.g. `git push origin v1.0.0`) to cut a
# release by hand. The primary path is release-please.yml (merge the standing
# release PR); use this only when that can't run — e.g. re-cutting a botched
# release.
#
# Delegates the actual release + e2e to the central reusable workflow
# (rocne/release-ci) so the manual and release-please paths can never drift.

on:
  push:
    tags:
      - "v*"

jobs:
  # gostow's break-glass path re-asserts a pre-1.0 guard here, because gostow
  # stays pre-1.0 until its engine is complete. dstow has no such era: it
  # debuts at v1.0.0 (DESIGN.md §9.3), so there is nothing to guard.

  release:
    permissions:
      contents: write
      issues: write
      id-token: write
      attestations: write
    uses: rocne/release-ci/.github/workflows/release.yml@v0.1.3
    with:
      version: ${{ github.ref_name }}
      goreleaser_config: .goreleaser/dstow.yaml
      project_name: dstow
      binary: dstow
      # No e2e_script: dstow has no release-e2e script yet — it arrives with
      # the installer (dstow#48). The input is optional/skip-when-empty.
    secrets: inherit
